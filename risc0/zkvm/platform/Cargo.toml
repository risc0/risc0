[package]
name = "risc0-zkvm-platform"
description = "RISC Zero zero-knowledge VM"
version = "5.0.0"
edition = { workspace = true }
license = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }

[package.metadata.docs.rs]
rustdoc-args = ["--cfg", "docsrs"]
features = [
    "rust-runtime",
    "panic-handler",
    "entrypoint",
    "export-syscalls",
    "export-libm",
    "export-getrandom",
    "getrandom",
    "unstable",
]

[features]
default = []
entrypoint = []
# exports a `getrandom` implementation that panics
export-getrandom = ["dep:bytemuck", "dep:getrandom", "dep:getrandom-v2"]
export-libm = ["dep:libm"]
export-syscalls = []
# exports a `getrandom` implementation that uses sys_random
getrandom = ["export-getrandom"]
heap-embedded-alloc = ["dep:critical-section", "dep:embedded-alloc", "rust-runtime"]
panic-handler = []
# Build a rust runtime
rust-runtime = ["export-libm", "export-syscalls"]
# Enable the sys_getenv syscall.
sys-getenv = []
# Enable the sys_argc and sys_argv syscalls.
sys-args = []
unstable = []

[dependencies]
cfg-if = "1.0"
num_enum = { version = "0.7.4", default-features = false }
paste = "1.0.15"
stability = "0.2"

# This crate should have as few dependencies as possible so it can be
# used as many places as possible to share the platform definitions.
[target.'cfg(target_os = "zkvm")'.dependencies]
bytemuck = { version = "1.13", optional = true }
critical-section = { version = "1.1.2", optional = true }
getrandom = { version = "0.3", optional = true }
getrandom-v2 = { version = "0.2", package = "getrandom", features = [
    "custom",
], optional = true }
libm = { version = "0.2", optional = true }

# The current published embedded-alloc doesn't compile
[target.'cfg(target_os = "zkvm")'.dependencies.embedded-alloc]
git = "https://github.com/risc0/embedded-alloc"
rev = "e412fe7ec11a3f951c8b37ceee9ee2d9fdac9d05"
features = ["allocator_api"]
optional = true
